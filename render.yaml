services:
  # Backend API Server
  - type: web
    name: shopflow-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install && npx prisma generate
    startCommand: cd backend && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: shopflow-db
          property: connectionString
      - key: PORT
        value: 5000

  # Frontend Static Site
  - type: web
    name: shopflow-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: shopflow-backend
          property: host
    
    # We use a trick to construct a full HTTPS URL from the host property:
    # Actually, Render doesn't support variable interpolation in `render.yaml` easily,
    # so we might need the user to update this to the actual full URL in the dashboard later
    # OR we can pass just the host and let the frontend prefix with `https://`.
    # Wait, Vite expects the full URL if we just use `VITE_API_URL` directly.
    # So if Render injects `shopflow-backend.onrender.com` as VITE_API_URL, 
    # we would need the frontend to prefix with https://...
    # But wait, we can just let Render set VITE_API_URL to the actual URL, but Render's `property: host` doesn't include the protocol.
    # To fix this, we'll set it to the expected URL statically, or we'll let the user configure it.
    # We can hardcode the expected `.onrender.com` domain based on the name.
      - key: VITE_API_URL
        value: https://shopflow-backend.onrender.com

databases:
  - name: shopflow-db
    plan: free # Change this based on your tier
    databaseName: shopflow
    user: shopflow_user
