services:
  # Backend API Server
  - type: web
    name: shopflow-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install && npx prisma generate && npx prisma db push --accept-data-loss
    startCommand: cd backend && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: shopflow-db
          property: connectionString
      - key: PORT
        value: 5000

  # Frontend Static Site
  - type: web
    name: shopflow-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: shopflow-db
    plan: free # Change this based on your tier
    databaseName: shopflow
    user: shopflow_user
